name: CD Stage

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-stage:
    runs-on: ubuntu-latest
    needs: build-and-publish
    environment:
      name: stage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          source: deploy/compose/*
          target: ${{ secrets.STAGE_DEPLOY_PATH }}
          strip_components: 2

      - name: Deploy on stage host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -eu
            export APP_IMAGE='${{ needs.build-and-publish.outputs.image_ref }}'
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            cd '${{ secrets.STAGE_DEPLOY_PATH }}'
            docker compose -f compose.yml -f compose.stage.yml pull
            docker compose -f compose.yml -f compose.stage.yml up -d --remove-orphans
            docker image prune -f

      - name: Stage smoke check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGE_SSH_HOST }}
          username: ${{ secrets.STAGE_SSH_USER }}
          key: ${{ secrets.STAGE_SSH_KEY }}
          script: |
            set -eu
            cd '${{ secrets.STAGE_DEPLOY_PATH }}'
            docker compose -f compose.yml -f compose.stage.yml ps
