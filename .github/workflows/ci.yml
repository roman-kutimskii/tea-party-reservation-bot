name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: tea_party_test
          POSTGRES_USER: tea_party
          POSTGRES_PASSWORD: tea_party
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U tea_party -d tea_party_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg://tea_party:tea_party@127.0.0.1:5432/tea_party_test
      APP_ENV: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.10.9'

      - name: Verify Python project files exist
        run: |
          if [ ! -f pyproject.toml ]; then
            echo 'pyproject.toml is missing; application package hooks are not wired yet.' >&2
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      - name: Unit tests
        run: uv run pytest tests/unit

      - name: Integration tests
        run: uv run pytest tests/integration

      - name: Build Docker image
        run: docker build --tag tea-party-reservation-bot:ci .

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filesystem vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Image vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: tea-party-reservation-bot:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
