- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - fail2ban
      - git
      - jq
      - postgresql-client
      - restic
      - ufw
      - unattended-upgrades
    state: present

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Enable unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Configure UFW default deny incoming
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny

- name: Configure UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH from approved CIDRs
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ item }}"
  loop: "{{ ufw_allowed_ssh_cidrs }}"

- name: Ensure fail2ban is enabled
  ansible.builtin.service:
    name: fail2ban
    enabled: true
    state: started
