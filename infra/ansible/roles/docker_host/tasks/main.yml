- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true
    state: present

- name: Create deploy group
  ansible.builtin.group:
    name: "{{ deploy_group }}"
    state: present

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    groups: docker
    append: true
    shell: /bin/bash
    create_home: true

- name: Check for root authorized_keys
  ansible.builtin.stat:
    path: /root/.ssh/authorized_keys
  register: root_authorized_keys

- name: Create deploy SSH directory
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: '0700'

- name: Copy root authorized_keys to deploy user
  ansible.builtin.copy:
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ deploy_user }}/.ssh/authorized_keys"
    remote_src: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: '0600'
  when: root_authorized_keys.stat.exists

- name: Create deploy root and shared backup directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: '0750'
  loop:
    - "{{ deploy_root }}"
    - "{{ backup_root }}"

- name: Create compose directory for each environment
  ansible.builtin.file:
    path: "{{ item.value.compose_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: '0750'
  loop: "{{ app_environments | dict2items }}"

- name: Create env directory for each environment
  ansible.builtin.file:
    path: "{{ item.value.env_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: '0750'
  loop: "{{ app_environments | dict2items }}"

- name: Configure Docker daemon
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    mode: '0644'
    content: |
      {
        "live-restore": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "5"
        }
      }
  notify: Restart docker

- name: Install compose systemd unit for each environment
  ansible.builtin.template:
    src: tea-party-compose.service.j2
    dest: "/etc/systemd/system/{{ item.value.service_name }}"
    mode: '0644'
  vars:
    env_cfg: "{{ item.value }}"
  loop: "{{ app_environments | dict2items }}"
  notify: Reload systemd

- name: Enable Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Enable compose service for each environment
  ansible.builtin.service:
    name: "{{ item.value.service_name }}"
    enabled: true
    state: stopped
  loop: "{{ app_environments | dict2items }}"
